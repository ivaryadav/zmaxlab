<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" role="img" aria-label="ZmaxLab">
  <title>ZmaxLab</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b6fff"/>
      <stop offset="100%" stop-color="#00c896"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect width="40" height="40" rx="10" fill="url(#g)"/>
  <!-- Subtle top highlight -->
  <rect width="40" height="20" rx="10" fill="url(#gh)"/>
  <rect y="10" width="40" height="10" fill="url(#gh)"/>

  <!-- ECG heartbeat line -->
  <polyline
    points="4,20 10,20 13,13 16.5,29 19.5,12 23,20 36,20"
    stroke="white" stroke-width="2.8" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small cross detail top-right — signals healthcare -->
  <line x1="30" y1="7" x2="30" y2="12" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="27.5" y1="9.5" x2="32.5" y2="9.5" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-linecap="round"/>
</svg>

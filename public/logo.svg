<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 218 50" role="img" aria-label="ZmaxLab - Healthcare Websites">
  <title>ZmaxLab</title>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b6fff"/>
      <stop offset="100%" stop-color="#00c896"/>
    </linearGradient>
    <linearGradient id="gradh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="gradtext" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b6fff"/>
      <stop offset="100%" stop-color="#00c896"/>
    </linearGradient>
  </defs>

  <!-- ── Icon ── -->
  <!-- Gradient rounded square -->
  <rect x="0" y="5" width="40" height="40" rx="10" fill="url(#grad)"/>
  <!-- Subtle inner highlight -->
  <rect x="0" y="5" width="40" height="22" rx="10" fill="url(#gradh)"/>
  <rect x="0" y="15" width="40" height="12" fill="url(#gradh)"/>

  <!-- ECG / heartbeat line -->
  <polyline
    points="4,25 10,25 13,18 16.5,34 19.5,17 23,25 36,25"
    stroke="white" stroke-width="2.6" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Medical cross — top-right of icon -->
  <line x1="30" y1="11" x2="30" y2="17" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="27" y1="14" x2="33" y2="14" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ── Wordmark ── -->
  <!-- "Zmax" in white -->
  <text x="50" y="32"
    font-family="'Space Grotesk','Inter','Segoe UI',system-ui,sans-serif"
    font-weight="800" font-size="24" letter-spacing="-0.8"
    fill="white">Zmax</text>

  <!-- "Lab" in teal gradient -->
  <text x="118" y="32"
    font-family="'Space Grotesk','Inter','Segoe UI',system-ui,sans-serif"
    font-weight="800" font-size="24" letter-spacing="-0.8"
    fill="#00c896">Lab</text>

  <!-- Tagline separator dot -->
  <circle cx="50" cy="43" r="1.5" fill="rgba(255,255,255,0.25)"/>

  <!-- Tagline text -->
  <text x="57" y="46"
    font-family="'Inter','Segoe UI',system-ui,sans-serif"
    font-weight="500" font-size="9"
    fill="rgba(255,255,255,0.42)"
    letter-spacing="1.8">HEALTHCARE WEBSITES</text>
</svg>

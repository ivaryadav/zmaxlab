<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 58" role="img" aria-label="ZmaxLab - Healthcare Websites">
  <title>ZmaxLab</title>
  <defs>

    <!-- ── Glass body fill ── -->
    <linearGradient id="glassBody" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"   stop-color="#0b1928"/>
      <stop offset="60%"  stop-color="#060e1c"/>
      <stop offset="100%" stop-color="#020810"/>
    </linearGradient>

    <!-- ── Blue-teal color tint (glass interior scatter) ── -->
    <linearGradient id="glassTint" x1="0.05" y1="0" x2="0.95" y2="1">
      <stop offset="0%"   stop-color="rgba(55,130,255,0.24)"/>
      <stop offset="48%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,210,170,0.2)"/>
    </linearGradient>

    <!-- ── Fresnel edge darkening ── -->
    <radialGradient id="edgeDark" cx="50%" cy="50%" r="50%">
      <stop offset="52%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="78%"  stop-color="rgba(0,0,0,0.22)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.52)"/>
    </radialGradient>

    <!-- ── Secondary bottom-right teal specular ── -->
    <radialGradient id="spec2" cx="78%" cy="84%" r="36%">
      <stop offset="0%"   stop-color="rgba(0,220,170,0.38)"/>
      <stop offset="100%" stop-color="rgba(0,220,170,0)"/>
    </radialGradient>

    <!-- ── Primary top-left specular (main water-drop shine) ── -->
    <radialGradient id="spec1" cx="28%" cy="20%" r="58%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.78)"/>
      <stop offset="32%"  stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- ── Rim border gradient (bright top-left → teal bottom-right) ── -->
    <linearGradient id="rimBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="28%"  stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="65%"  stop-color="rgba(0,210,170,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,210,170,0.1)"/>
    </linearGradient>

    <!-- ── Inner second rim (depth) ── -->
    <linearGradient id="innerRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>

    <!-- ── Mirror caustic glow (below icon) ── -->
    <radialGradient id="caustic" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(0,200,165,0.55)"/>
      <stop offset="45%"  stop-color="rgba(0,200,165,0.22)"/>
      <stop offset="100%" stop-color="rgba(0,200,165,0)"/>
    </radialGradient>

    <!-- ── Wordmark: "Zmax" cool-white ── -->
    <linearGradient id="zmaxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ddeeff"/>
      <stop offset="100%" stop-color="#a8cce0"/>
    </linearGradient>

    <!-- ── Wordmark: "Lab" teal-blue ── -->
    <linearGradient id="labGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00d4a8"/>
      <stop offset="100%" stop-color="#1a8eff"/>
    </linearGradient>

    <!-- ── ECG glow filter ── -->
    <filter id="ecgGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Icon drop shadow + edge glow ── -->
    <filter id="iconShadow" x="-18%" y="-12%" width="136%" height="148%">
      <feDropShadow dx="0" dy="4"  stdDeviation="5"   flood-color="#000000"       flood-opacity="0.72"/>
      <feDropShadow dx="0" dy="1"  stdDeviation="2"   flood-color="rgba(0,140,200,0.5)" flood-opacity="1"/>
    </filter>

    <!-- ── Soft blur for mirror/caustic ── -->
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

  </defs>

  <!-- ════════════════════════════════════════
       MIRROR SURFACE — caustic light pool
  ════════════════════════════════════════ -->
  <ellipse cx="24" cy="53" rx="24" ry="5.5" fill="url(#caustic)" filter="url(#softBlur)"/>
  <ellipse cx="24" cy="53" rx="14" ry="3"   fill="rgba(0,210,165,0.35)" filter="url(#softBlur)"/>

  <!-- ════════════════════════════════════════
       ICON — water drop on mirror
  ════════════════════════════════════════ -->
  <g filter="url(#iconShadow)">

    <!-- 1. Dark glass body -->
    <rect x="2" y="4" width="44" height="44" rx="12" fill="url(#glassBody)"/>

    <!-- 2. Blue-teal interior tint -->
    <rect x="2" y="4" width="44" height="44" rx="12" fill="url(#glassTint)"/>

    <!-- 3. Fresnel edge darkening -->
    <rect x="2" y="4" width="44" height="44" rx="12" fill="url(#edgeDark)"/>

    <!-- 4. Bottom-right secondary specular (teal caustic scatter) -->
    <rect x="2" y="4" width="44" height="44" rx="12" fill="url(#spec2)"/>

    <!-- 5. ECG heartbeat line — white with glow -->
    <polyline
      points="6,26 12,26 15,18 18.5,36 21.5,16 25,26 38,26"
      stroke="rgba(255,255,255,0.88)" stroke-width="2.3" fill="none"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#ecgGlow)"/>

    <!-- 6. Medical cross — teal -->
    <line x1="33" y1="11" x2="33" y2="17" stroke="rgba(0,220,170,0.85)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="30" y1="14" x2="36" y2="14" stroke="rgba(0,220,170,0.85)" stroke-width="1.8" stroke-linecap="round"/>

    <!-- 7. Primary top-left specular (the "eye" of the water drop) -->
    <rect x="2" y="4" width="44" height="44" rx="12" fill="url(#spec1)"/>

    <!-- 8. Specular highlight cluster — layered ellipses, getting brighter -->
    <ellipse cx="17" cy="13" rx="10" ry="5.5" fill="rgba(255,255,255,0.1)"/>
    <ellipse cx="14" cy="10.5" rx="6.5" ry="3.5" fill="rgba(255,255,255,0.22)"/>
    <ellipse cx="11.5" cy="8.5" rx="3.5" ry="2.2" fill="rgba(255,255,255,0.52)"/>
    <ellipse cx="10"   cy="7.5" rx="1.8" ry="1.2" fill="rgba(255,255,255,0.82)"/>
    <!-- Hot-spot: tiny ultra-bright point -->
    <ellipse cx="9.2"  cy="6.8" rx="0.9" ry="0.7" fill="rgba(255,255,255,0.97)"/>

    <!-- 9. Outer rim border (bright to teal) -->
    <rect x="2" y="4" width="44" height="44" rx="12" fill="none"
          stroke="url(#rimBorder)" stroke-width="1.5"/>

    <!-- 10. Inner rim (depth illusion) -->
    <rect x="3.5" y="5.5" width="41" height="41" rx="10.5" fill="none"
          stroke="url(#innerRim)" stroke-width="0.6"/>

  </g>

  <!-- Mirror reflection ghost below icon -->
  <rect x="4" y="48" width="40" height="7" rx="2"
        fill="rgba(10,40,80,0.45)" filter="url(#softBlur)" opacity="0.5"/>

  <!-- ════════════════════════════════════════
       WORDMARK
  ════════════════════════════════════════ -->

  <!-- "Zmax" — cool white gradient -->
  <text x="54" y="32"
    font-family="'Space Grotesk','Inter','Segoe UI',system-ui,sans-serif"
    font-weight="800" font-size="24" letter-spacing="-0.8"
    fill="url(#zmaxGrad)">Zmax</text>

  <!-- "Lab" — teal-blue gradient -->
  <text x="120" y="32"
    font-family="'Space Grotesk','Inter','Segoe UI',system-ui,sans-serif"
    font-weight="800" font-size="24" letter-spacing="-0.8"
    fill="url(#labGrad)">Lab</text>

  <!-- Tagline separator dot -->
  <circle cx="54" cy="44" r="1.4" fill="rgba(255,255,255,0.2)"/>

  <!-- Tagline text -->
  <text x="61" y="47"
    font-family="'Inter','Segoe UI',system-ui,sans-serif"
    font-weight="500" font-size="9"
    fill="rgba(255,255,255,0.35)"
    letter-spacing="1.8">HEALTHCARE WEBSITES</text>

</svg>
